name: r26_it_122
description: "HeritageAR – AI-Powered Offline AR Heritage Exploration System."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  sensors_plus: ^6.0.1
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera feed
  camera: ^0.12.0

  # On-device TFLite inference
  tflite_flutter: ^0.10.4

  # Image conversion for camera frames
  image: ^4.2.0

  # Offline SQLite database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File-system path helper
  path_provider: ^2.1.4

  # GPS/geofence-based landmark site lock
  geolocator: ^11.1.0

  # AR engine (ARCore / ARKit) - disabled until NDK+AGP compat resolved
  # ar_flutter_plugin: ^0.7.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/landmark_model.tflite
    - assets/images/
    - assets/embeddings/
    - assets/config/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
