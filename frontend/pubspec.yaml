name: heritage_ar
description: "HeritageAR – AI-Powered Offline AR Heritage Exploration System."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Camera feed
  camera: ^0.10.5+9

  # On-device TFLite inference (model integration pending – stubbed for UI demo)
  # tflite_flutter: ^0.10.4

  # Offline SQLite database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # File-system path helper
  path_provider: ^2.1.4

  # AR engine (ARCore / ARKit) - disabled until NDK+AGP compat resolved
  # ar_flutter_plugin: ^0.7.3

  # Add this to your dependencies:
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/
    - assets/embeddings/
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
